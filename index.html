<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="clock">
      <div class="date-window" id="date-display"></div>
      <div class="hand hour" id="hour-hand"></div>
      <div class="hand minute" id="minute-hand"></div>
      <div class="hand second" id="second-hand"></div>
      <div class="center-dot"></div>
      <div class="number" style="--rot: 30deg"><span>1</span></div>
      <div class="number" style="--rot: 60deg"><span>2</span></div>
      <div class="number" style="--rot: 90deg"><span>3</span></div>
      <div class="number" style="--rot: 120deg"><span>4</span></div>
      <div class="number" style="--rot: 150deg"><span>5</span></div>
      <div class="number" style="--rot: 180deg"><span>6</span></div>
      <div class="number" style="--rot: 210deg"><span>7</span></div>
      <div class="number" style="--rot: 240deg"><span>8</span></div>
      <div class="number" style="--rot: 270deg"><span>9</span></div>
      <div class="number" style="--rot: 300deg"><span>10</span></div>
      <div class="number" style="--rot: 330deg"><span>11</span></div>
      <div class="number" style="--rot: 360deg"><span>12</span></div>
    </div>
    <div id="time-display"></div>
  </div>  
  <script>
    function updateClock() {
      const now = new Date();
      
      // Get time units
      const seconds = now.getSeconds();
      const milliseconds = now.getMilliseconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();
    
      // Calculate degrees for each hand
      // Each second is 6 degrees (360 / 60)
      // Each minute is 6 degrees (360 / 60) + adjustment for seconds
      // Each hour is 30 degrees (360 / 12) + adjustment for minutes
      const secondsDegrees = (seconds * 6) + (milliseconds * 0.006);
      const minutesDegrees = (minutes * 6) + (seconds * 0.1);
      const hoursDegrees = (hours * 30) + (minutes * 0.5);
    
      // Apply the rotation to the elements
      const secondHand = document.getElementById('second-hand');
      const minuteHand = document.getElementById('minute-hand');
      const hourHand = document.getElementById('hour-hand');

      // If we are at 0 seconds, disable the transition to jump instantly
      if (seconds === 0) {
        secondHand.classList.add('no-transition');
      } else {
        secondHand.classList.remove('no-transition');
      }
      
    
      secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
      minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
      hourHand.style.transform = `rotate(${hoursDegrees}deg)`;

      const timeDisplay = document.getElementById('time-display');
  
      // Formatting: 12-hour clock with AM/PM and Timezone
      const timeString = now.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true,
          timeZoneName: 'short'
      });
    
      timeDisplay.innerText = timeString;

      const dateDisplay = document.getElementById('date-display');
      const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
      dateString = now.toLocaleDateString('en-US', dateOptions).toUpperCase().replace(',', ''); 
      dateDisplay.innerText = dateString;
    }
    
    // Run the function every 1000 milliseconds (1 second)
    setInterval(updateClock, 1000);
    
    // Run it once immediately so the clock doesn't wait a second to start
    updateClock();
  </script>
</body>
</html>
