<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock">
    <div class="hand hour" id="hour-hand"></div>
    <div class="hand minute" id="minute-hand"></div>
    <div class="hand second" id="second-hand"></div>
    <div class="number n1">1</div>
    <div class="number n2">2</div>
    <div class="number n3">3</div>
    <div class="number n4">4</div>
    <div class="number n5">5</div>
    <div class="number n6">6</div>
    <div class="number n7">7</div>
    <div class="number n8">8</div>
    <div class="number n9">9</div>
    <div class="number n10">10</div>
    <div class="number n11">11</div>
    <div class="number n12">12</div>
    <div class="center-dot"></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      // Calculation logic
      const secondsDegrees = (seconds * 6);
      const minutesDegrees = (minutes * 6) + (seconds * 0.1);
      const hoursDegrees = (hours * 30) + (minutes * 0.5);

      document.getElementById('second-hand').style.transform = `rotate(${secondsDegrees}deg)`;
      document.getElementById('minute-hand').style.transform = `rotate(${minutesDegrees}deg)`;
      document.getElementById('hour-hand').style.transform = `rotate(${hoursDegrees}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
